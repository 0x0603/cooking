linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: { { PROJECT_NAME } }
  govet:
    check-shadowing: true
  errcheck:
    check-type-assertions: true
    check-blank: true
  gosimple:
    checks: ['all']
  staticcheck:
    checks: ['all']
  unused:
    check-exported: true
  misspell:
    locale: US

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosimple
        - staticcheck
