name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linter
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-format

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install project dependencies
        run: |
          find projects -name "package.json" -not -path "*/node_modules/*" -execdir npm ci \;

      - name: Run tests
        run: |
          find projects -name "package.json" -not -path "*/node_modules/*" -execdir npm test \;
        continue-on-error: true

  go-check:
    name: Go Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Check Go formatting
        run: |
          if find projects -name "*.go" | head -1 | grep -q .; then
            gofmt_output=$(gofmt -l $(find projects -name "*.go" -not -path "*/vendor/*"))
            if [ -n "$gofmt_output" ]; then
              echo "Files not formatted with gofmt:"
              echo "$gofmt_output"
              exit 1
            fi
          fi

      - name: Run Go vet
        run: |
          for dir in $(find projects -name "go.mod" -exec dirname {} \;); do
            echo "Checking $dir..."
            cd "$dir" && go vet ./... && cd -
          done
        continue-on-error: true
